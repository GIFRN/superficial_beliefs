backends:
  openai_gpt5nano:
    type: openai
    model: gpt-5-nano
    temperature: 1.0
    max_tokens: 4000
    reasoning_effort: minimal
  openai_gpt5mini:
    type: openai
    model: gpt-5-mini
    temperature: 1.0
    max_tokens: 8000
    reasoning_effort: low
  openai_gpt4o:
    type: openai
    model: gpt-4o
    temperature: 1.0
    max_tokens: 256
  anthropic_claude:
    type: anthropic
    model: claude-3-opus-20240229
    temperature: 1.0
    max_tokens: 256
  local_vllm:
    type: vllm
    endpoint: http://localhost:8000/v1
    model: meta-llama-3-70b-instruct
    temperature: 1.0
    max_tokens: 256
sampling:
  default_backend: openai_gpt5mini
  S: 5
  seed: 17
